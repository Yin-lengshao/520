<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 响应式核心视口标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致我的女孩 | 浪漫贺卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "微软雅黑", sans-serif;
            color: #ffffff;
            /* 禁止移动端页面拖动 */
            touch-action: none;
        }

        /* 主容器 */
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* 分页通用样式 - 响应式基础 */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .page.active {
            opacity: 1;
            z-index: 10;
        }

        /* 分页背景 */
        .page1 {
            background: linear-gradient(45deg, #ff758f, #ff7eb3);
        }
        .page2 {
            background: linear-gradient(45deg, #a1c4fd, #c2e9fb);
        }
        .page3 {
            background: linear-gradient(45deg, #ffecd2, #fcb69f);
        }
        .page4 {
            background: linear-gradient(45deg, #d4fc79, #96e6a1);
        }

        /* 文字基础样式 */
        .title {
            font-size: clamp(28px, 6vw, 46px);
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        .desc {
            font-size: clamp(16px, 3vw, 22px);
            line-height: 2;
            text-align: center;
            max-width: 90%;
        }
        .type-text {
            font-size: clamp(14px, 2.5vw, 20px);
            margin-top: 30px;
            border-right: 2px solid #fff;
            padding-right: 4px;
            height: 30px;
        }
        .tip {
            position: absolute;
            bottom: 50px;
            font-size: clamp(12px, 2vw, 16px);
            opacity: 0.8;
        }

        /* 右侧导航点 - 移动端适配 */
        .nav-dot {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .dot {
            width: clamp(10px, 2vw, 14px);
            height: clamp(10px, 2vw, 14px);
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot.on {
            background: #fff;
            transform: scale(1.3);
        }

        /* 爱心通用样式 */
        .heart {
            position: absolute;
            width: clamp(20px, 4vw, 28px);
            height: clamp(20px, 4vw, 28px);
            background: #ff3366;
            transform: rotate(45deg);
            pointer-events: none;
        }
        .heart::before,
        .heart::after {
            content: "";
            width: 100%;
            height: 100%;
            background: #ff3366;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { left: -50%; top: 0; }
        .heart::after { top: -50%; left: 0; }

        /* 漂浮爱心动画 */
        @keyframes floatHeart {
            0% { transform: rotate(45deg) translateY(0); opacity: 0.7; }
            50% { transform: rotate(45deg) translateY(-40px); opacity: 1; }
            100% { transform: rotate(45deg) translateY(0); opacity: 0.7; }
        }

        /* 点击爱心爆炸 */
        @keyframes heartBurst {
            0% { transform: rotate(45deg) scale(0.5); opacity: 1; }
            100% { transform: rotate(45deg) scale(2.2); opacity: 0; }
        }

        /* 飘落花瓣 */
        .flower {
            position: absolute;
            width: clamp(8px, 2vw, 12px);
            height: clamp(8px, 2vw, 12px);
            background: #ffc0cb;
            border-radius: 50%;
            opacity: 0.6;
            pointer-events: none;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }

        /* 小屏手机特殊适配 */
        @media (max-width: 480px) {
            .nav-dot {
                right: 12px;
                gap: 15px;
            }
            .tip {
                bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- 右侧导航点 -->
    <div class="nav-dot">
        <div class="dot on" data-num="0"></div>
        <div class="dot" data-num="1"></div>
        <div class="dot" data-num="2"></div>
        <div class="dot" data-num="3"></div>
    </div>

    <!-- 主页面容器 -->
    <div class="container">
        <div class="page page1 active">
            <h2 class="title">有幸相遇</h2>
            <p class="desc">大千世界，人来人往<br>很开心，命运让我遇见了你</p>
            <div class="type-text"></div>
            <div class="tip">滑动切换页面</div>
        </div>

        <div class="page page2">
            <h2 class="title">满心欢喜</h2>
            <p class="desc">和你相处的每一刻都格外珍贵<br>你的笑容，是我最喜欢的风景</p>
            <div class="type-text"></div>
            <div class="tip">滑动切换页面</div>
        </div>

        <div class="page page3">
            <h2 class="title">朝夕相伴</h2>
            <p class="desc">不用惊天动地的浪漫<br>只愿朝夕相处，岁岁年年</p>
            <div class="type-text"></div>
            <div class="tip">滑动切换页面</div>
        </div>

        <div class="page page4">
            <h2 class="title">挚爱永恒</h2>
            <p class="desc">往后的路，想一直牵着你的手<br>爱意绵长，永不褪色</p>
            <div class="type-text"></div>
            <div class="tip">❤️ 永远爱你 ❤️</div>
        </div>
    </div>

    <script>
        const pages = document.querySelectorAll('.page');
        const dots = document.querySelectorAll('.dot');
        const typeBox = document.querySelectorAll('.type-text');
        const totalPage = pages.length;
        let now = 0;
        let lock = false;

        // 打字机文案
        const textList = [
            "遇见你的那天，风都变得温柔。",
            "一想到你，嘴角就会不自觉上扬。",
            "最长的陪伴，就是最好的情话。",
            "我的世界，从此满心都是你。"
        ];

        // 切换页面
        function changePage(index) {
            if(lock) return;
            lock = true;

            pages.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            dots.forEach((item, i) => {
                item.classList.toggle('on', i === index);
            });

            runType(index);

            setTimeout(() => {
                lock = false;
            }, 1000);
        }

        // 打字机效果
        function runType(idx) {
            let box = typeBox[idx];
            let str = textList[idx];
            box.innerText = "";
            let i = 0;
            clearInterval(box.timer);
            box.timer = setInterval(() => {
                if(i >= str.length) {
                    clearInterval(box.timer);
                    return;
                }
                box.innerText += str[i];
                i++;
            }, 100);
        }

        // 电脑端：滚轮翻页
        document.addEventListener('wheel', e => {
            if(e.deltaY > 0) {
                if(now < totalPage - 1) now++;
            } else {
                if(now > 0) now--;
            }
            changePage(now);
        });

        // 移动端：触摸滑动翻页
        let startY = 0;
        let moveY = 0;
        document.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
        });
        document.addEventListener('touchmove', e => {
            e.preventDefault(); // 阻止页面原生滚动
            moveY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', () => {
            const diff = startY - moveY;
            // 滑动阈值，避免误触
            if(Math.abs(diff) > 50) {
                if(diff > 0) {
                    // 上滑 → 下一页
                    if(now < totalPage - 1) now++;
                } else {
                    // 下滑 → 上一页
                    if(now > 0) now--;
                }
                changePage(now);
            }
        });

        // 点击导航点翻页
        dots.forEach((dot, idx) => {
            dot.addEventListener('click', () => {
                now = idx;
                changePage(now);
            });
        });

        // 随机漂浮爱心
        function createFloatHeart() {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            heart.style.animation = `floatHeart ${3 + Math.random() * 2}s infinite ease-in-out`;
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
        setInterval(createFloatHeart, 800);

        // 点击/触摸 爱心爆炸
        document.addEventListener('click', e => {
            createBurstHeart(e.clientX, e.clientY);
        });
        document.addEventListener('touchstart', e => {
            let touch = e.touches[0];
            createBurstHeart(touch.clientX, touch.clientY);
        });
        function createBurstHeart(x, y) {
            let h = document.createElement('div');
            h.className = 'heart';
            h.style.left = x + 'px';
            h.style.top = y + 'px';
            h.style.animation = 'heartBurst 1s forwards';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        // 花瓣飘落
        function createFlower() {
            let fl = document.createElement('div');
            fl.className = 'flower';
            fl.style.left = Math.random() * 100 + 'vw';
            fl.style.animation = `fall ${5 + Math.random() * 3}s linear`;
            document.body.appendChild(fl);
            setTimeout(() => fl.remove(), 8000);
        }
        setInterval(createFlower, 600);

        // 初始化
        window.onload = function() {
            changePage(0);
        }
    </script>
</body>
</html>
